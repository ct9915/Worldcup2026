name: Update Standings

on:
  schedule:
    - cron: '5 * * * *'   # 每小時第5分鐘執行
  workflow_dispatch:        # 也可在 Actions 頁手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch standings
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/fetch_standings.py

      - name: Commit and push if data changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || (
            git commit -m "chore: update standings $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          )
