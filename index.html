<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA 世界盃 — 小組積分榜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --pitch:#0d1117;--card:#1c2230;--border:#2a3244;
  --gold:#f0b429;--green:#26c281;--red:#e53e3e;
  --text:#e2e8f0;--muted:#718096;--accent:#4da6ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--pitch);color:var(--text);min-height:100vh;overflow-x:hidden}
header{
  background:linear-gradient(180deg,#080d1a 0%,var(--pitch) 100%);
  border-bottom:1px solid var(--border);
  padding:20px 28px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:14px}
.wc-badge{
  width:50px;height:50px;background:linear-gradient(135deg,var(--gold) 0%,#e6931a 100%);
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 20px rgba(240,180,41,.25);flex-shrink:0;
}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4vw,42px);letter-spacing:2px;line-height:1;color:#fff}
h1 span{display:block;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.live-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(38,194,129,.1);border:1px solid rgba(38,194,129,.3);
  border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;color:var(--green);letter-spacing:1px;
}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.legend-bar{
  display:flex;align-items:center;gap:20px;
  padding:10px 28px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:500}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-ts{margin-left:auto;font-size:12px;color:var(--muted)}
.filter-bar{padding:14px 28px;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.filter-btn{
  padding:6px 15px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--muted);font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;letter-spacing:.5px;font-family:'Inter',sans-serif;
}
.filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.groups-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));
  gap:20px;padding:22px 28px 48px;
}
.group-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
}
.group-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.45)}
.group-header{
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,rgba(77,166,255,.07) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
.group-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent)}
.group-info{text-align:right}
.group-played{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px}
.group-results{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;max-width:260px;text-align:right}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;
  padding:8px 9px 6px;text-align:center;border-bottom:1px solid var(--border);
}
thead th.tc{text-align:left;padding-left:12px}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;position:relative}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:11px 9px;text-align:center;font-size:14px;font-family:'JetBrains Mono',monospace}
.rc{width:38px;padding-left:6px}
.rank-badge{
  width:26px;height:26px;border-radius:5px;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0;
}
.r1{background:linear-gradient(135deg,#f6d365,#fda085);color:#000}
.r2{background:linear-gradient(135deg,#b0bec5,#78909c);color:#000}
.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}
.ro{background:rgba(255,255,255,.07);color:var(--muted)}
.team-cell{text-align:left;padding-left:8px;min-width:150px}
.team-inner{display:flex;align-items:center;gap:8px}
.flag{font-size:22px;line-height:1;flex-shrink:0}
.team-name{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--text)}
.team-note{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.5px;margin-top:1px}
.pts-cell{font-weight:700;font-size:16px;color:#fff}
.gp{color:var(--green)}.gn{color:var(--red)}.gz{color:var(--muted)}
.qa{border-left:3px solid var(--green)}
.qp{border-left:3px solid var(--gold)}
.qo{border-left:3px solid transparent}
.tiebreak-note{
  font-size:12px;color:var(--gold);padding:8px 14px 10px;font-style:italic;
  display:flex;align-items:flex-start;gap:4px;line-height:1.5;
  background:rgba(240,180,41,.04);border-top:1px solid rgba(240,180,41,.1);
}
footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:480px){
  header{padding:14px 16px}
  .groups-grid{padding:14px 12px 32px;gap:12px}
  .filter-bar,.legend-bar{padding:10px 14px}
}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="wc-badge">⚽</div>
    <h1><span>FIFA World Cup 2026</span>小組賽積分榜</h1>
  </div>
  <div class="live-pill" id="livePill"><div class="live-dot"></div>LIVE · ―</div>
</header>
<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:#26c281"></div>直接晉級（前2名）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div>第3名，競爭外卡</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,.12)"></div>目前出局線</div>
  <div class="legend-ts" id="legendTs">載入中…</div>
</div>
<div class="filter-bar" id="filterBar"></div>
<div class="groups-grid" id="groupsGrid"></div>
<footer>
  數據來源：FIFA / CBS Sports / ESPN / The Scotsman ·
  歷史預測依近5年FIFA積分排名 ·
  <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026" target="_blank">FIFA 官網 ↗</a>
</footer>
<script>
function gdText(t){const d=t.gf-t.ga;return d>0?'+'+d:d===0?'±0':''+d}
function gdCls(t){const d=t.gf-t.ga;return d>0?'gp':d<0?'gn':'gz'}
function qCls(r){return r<=2?'qa':r===3?'qp':'qo'}
function rbCls(r){return r<=3?'r'+r:'ro'}

function buildCard(g){
  const rows=g.teams.map((t,i)=>{
    const r=i+1;
    return `<tr class="${qCls(r)}">
      <td class="rc"><span class="rank-badge ${rbCls(r)}">${r}</span></td>
      <td class="team-cell"><div class="team-inner">
        <span class="flag">${t.flag}</span>
        <div>
          <div class="team-name">${t.name}</div>
          ${t.note?`<div class="team-note">${t.note}</div>`:''}
        </div>
      </div></td>
      <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td>
      <td class="${gdCls(t)}">${gdText(t)}</td>
      <td class="pts-cell">${t.pts}</td>
    </tr>`;
  }).join('');
  const resHTML=g.results.map(r=>`<span>${r}</span>`).join(' · ');
  return `
  <div class="group-card" data-group="${g.id}">
    <div class="group-header">
      <div class="group-name">小組 ${g.id}</div>
      <div class="group-info">
        <div class="group-played">已賽 ${g.played} 場</div>
        <div class="group-results">${resHTML||'尚未開賽'}</div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th class="rc">#</th><th class="tc">球隊</th>
        <th>場</th><th>勝</th><th>平</th><th>負</th>
        <th>進</th><th>失</th><th>±</th><th>分</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${g.tieNote?`<div class="tiebreak-note">⚡ ${g.tieNote}</div>`:''}
  </div>`;
}

async function init(){
  const res = await fetch('data.json?t='+Date.now());
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();

  document.getElementById('livePill').innerHTML =
    `<div class="live-dot"></div>LIVE · ${data.round}`;
  document.getElementById('legendTs').textContent =
    `資料截至 ${data.lastUpdated} · 同分依序：淨球差→進球→FIFA排名`;

  const fb=document.getElementById('filterBar');
  const gd_el=document.getElementById('groupsGrid');

  const allBtn=document.createElement('button');
  allBtn.className='filter-btn active';allBtn.textContent='全部小組';
  allBtn.onclick=()=>{
    document.querySelectorAll('[data-group]').forEach(c=>c.style.display='');
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    allBtn.classList.add('active');
  };
  fb.appendChild(allBtn);

  data.groups.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='filter-btn';btn.textContent='小組 '+g.id;
    btn.onclick=()=>{
      document.querySelectorAll('[data-group]').forEach(c=>c.style.display=c.dataset.group===g.id?'':'none');
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    fb.appendChild(btn);
    gd_el.insertAdjacentHTML('beforeend',buildCard(g));
  });
}

init().catch(err=>{
  document.getElementById('groupsGrid').innerHTML=
    '<p style="color:var(--muted);padding:2rem;text-align:center">數據載入失敗，請重新整理頁面。</p>';
  console.error(err);
});
</script>
</body>
</html>
